remote_theme: mmistakes/minimal-mistakes

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

title: "LLMs, RAG & Agentic AI"
description: "A comprehensive 3-day course covering Large Language Models, Retrieval-Augmented Generation, Agentic AI, and Enterprise AI Architecture"

url: ""
baseurl: ""

permalink: /:categories/:title/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "docs"
  - scope:
      path: ""
      type: modules
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "docs"

analytics:
  provider: google
  google:
    measurement_id: ""

social:
  - icon: github
    links:
      - https://github.com/lochgeo/probable-memory

footer_content: "LLMs, RAG & Agentic AI Course. Built with <a href=\"https://mademistakes.com\">Minimal Mistakes</a>."

color_scheme: light

collections:
  modules:
    output: true
    permalink: /:collection/:name/

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

toc:
  layout: sidebar
  sidebar:
    left: true

read_time: true
words_per_minute: 200

exclude:
  - Gemfile.lock
  - node_modules/
  - vendor/
  - courseplan.txt
